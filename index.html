<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GTA 5 Car Manager - Final</title>
    <style>
        :root { --main-bg: #121212; --card-bg: #1e1e1e; --blue: #00a2ff; --red: #ff4444; --green: #28a745; --text: #e0e0e0; }
        body { background: var(--main-bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .header { border-bottom: 2px solid var(--blue); padding-bottom: 15px; margin-bottom: 30px; }
        .header h2 { color: var(--blue); margin: 0; }
        
        .brand-section { margin-bottom: 30px; background: var(--card-bg); padding: 20px; border-radius: 12px; }
        .brand-title { font-size: 1.4em; margin-bottom: 15px; color: #fff; font-weight: bold; border-left: 4px solid var(--blue); padding-left: 12px; }
        .car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
        
        .car-card { 
            background: #2a2a2a; padding: 12px; border-radius: 8px; 
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #333; transition: 0.2s;
        }
        /* 튕김 차량(취소선) 스타일 */
        .car-card.excluded { opacity: 0.35; background: #1a1a1a; border-color: var(--red); }
        .car-card.excluded .car-id, .car-card.excluded .car-name { text-decoration: line-through; color: #777; cursor: not-allowed; }

        .car-info { display: flex; flex-direction: column; overflow: hidden; }
        .car-name { font-size: 0.85em; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .car-id { color: var(--blue); font-weight: bold; cursor: pointer; text-decoration: underline; font-size: 1.1em; }
        
        button { padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8em; font-weight: bold; min-width: 80px; }
        .btn-exclude { background: #333; color: var(--red); border: 1px solid var(--red); }
        .btn-restore { background: var(--green); color: white; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--blue); color: white; padding: 10px 30px; border-radius: 25px; display: none; z-index: 100; }
    </style>
</head>

                { id: "rezvan2", name: "Rezvani Vengeance", active: true }

        };

        let currentData = initialData;

        function render() {
            const root = document.getElementById('manager-root');
            root.innerHTML = '';

            for (const [brand, cars] of Object.entries(currentData)) {
                const section = document.createElement('div');
                section.className = 'brand-section';
                
                let html = `<div class="brand-title">${brand}</div><div class="car-grid">`;
                
                cars.forEach((car, index) => {
                    const statusClass = car.active ? '' : 'excluded';
                    const btnLabel = car.active ? '튕김 보고' : '복구';
                    const btnClass = car.active ? 'btn-exclude' : 'btn-restore';

                    html += `
                        <div class="car-card ${statusClass}">
                            <div class="car-info">
                                <div class="car-id" onclick="${car.active ? `copyId('${car.id}')` : ''}">${car.id}</div>
                                <div class="car-name">${car.name}</div>
                            </div>
                            <button class="${btnClass}" onclick="toggleCar('${brand}', ${index})">${btnLabel}</button>
                        </div>
                    `;
                });
                
                html += `</div>`;
                section.innerHTML = html;
                root.appendChild(section);
            }
        }

        function toggleCar(brand, index) {
            currentData[brand][index].active = !currentData[brand][index].active;
            render();
        }

        function copyId(id) {
            navigator.clipboard.writeText(id).then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 1000);
            });
        }

        render();
    </script>
